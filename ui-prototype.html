<!doctype html>
<html lang="de">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <title>Slideshow Editor – UI Prototype</title>
    <style>
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            display: flex;
            flex-direction: column;
            background-color: #f8f9fa;
        }

        /* ── Material Symbols ── */
        .material-symbols-outlined {
            font-size: 1.2em;
            vertical-align: middle;
            line-height: 1;
        }
        .icon-sm .material-symbols-outlined {
            font-size: 1em;
        }

        /* ── Top Bar ── */
        #top-bar {
            flex: 0 0 auto;
            background: #fff;
            border-bottom: 1px solid #dee2e6;
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
        }
        .upload-group {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .drop-zone {
            border: 2px dashed #adb5bd;
            border-radius: 0.375rem;
            padding: 0.5rem 1.25rem;
            color: #6c757d;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: #f8f9fa;
            min-width: 210px;
            justify-content: center;
        }
        .drop-zone:hover {
            border-color: #0d6efd;
            color: #0d6efd;
        }
        .upload-group .btn {
            font-size: 0.8rem;
            padding: 0.25rem 0.75rem;
        }

        /* ── Middle: Editor Area ── */
        #editor-area {
            flex: 1 1 0;
            display: flex;
            overflow: hidden;
            padding: 0.75rem;
            gap: 0.75rem;
        }

        /* Slide Carousel (left panel) */
        #slide-carousel {
            flex: 0 0 200px;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            padding: 0.75rem;
        }
        #slide-carousel h6 {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: #6c757d;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        .slide-thumb {
            border: 2px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 0.4rem;
            background: #f1f3f5;
            font-size: 0.8rem;
            color: #495057;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            position: relative;
        }
        .slide-thumb.active {
            border-color: #0d6efd;
            background: #e7f1ff;
        }
        /* fake slide preview */
        .thumb-preview {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #fff;
            border-radius: 2px;
            border: 1px solid #dee2e6;
            padding: 0.3rem 0.35rem;
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            overflow: hidden;
        }
        .slide-thumb.active .thumb-preview {
            border-color: #93beff;
        }
        .fake-line {
            border-radius: 2px;
            background: #ced4da;
        }
        .fake-title  { height: 5px; width: 55%; background: #adb5bd; }
        .fake-line-l { height: 3px; width: 80%; }
        .fake-line-m { height: 3px; width: 65%; }
        .fake-line-s { height: 3px; width: 45%; }
        .fake-gap    { height: 2px; }
        .fake-img    { height: 14px; width: 40%; background: #dee2e6; border-radius: 2px; align-self: center; }

        .thumb-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .thumb-index {
            font-size: 0.7rem;
            color: #6c757d;
            font-weight: 500;
        }
        .slide-thumb.active .thumb-index { color: #0d6efd; }
        .slide-thumb .btn-remove {
            font-size: 0.7rem;
            padding: 0.05rem 0.2rem;
            line-height: 1;
        }
        #carousel-actions {
            display: flex;
            gap: 0.4rem;
            margin-top: 0.25rem;
        }
        #carousel-actions .btn-add {
            width: 100%;
            font-size: 0.8rem;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }

        /* Slide Editor (right panel) */
        #slide-editor {
            flex: 1 1 0;
            display: flex;
            flex-direction: column;
            background: #fff;
            border: 1px solid #dee2e6;
            border-radius: 0.5rem;
            padding: 0.75rem;
            overflow: hidden;
            align-items: center;
            justify-content: flex-start;
        }
        #slide-editor label {
            font-size: 0.8rem;
            color: #6c757d;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.4rem;
            align-self: flex-start;
            width: 100%;
            max-width: calc((100vh - 200px) * 16 / 9);
        }
        #slide-16-9-wrap {
            width: 100%;
            max-width: calc((100vh - 200px) * 16 / 9);
            aspect-ratio: 16 / 9;
        }
        #slide-16-9-wrap textarea {
            width: 100%;
            height: 100%;
            resize: none;
            font-family: monospace;
            font-size: 0.9rem;
        }

        /* ── Bottom Bar ── */
        #bottom-bar {
            flex: 0 0 auto;
            background: #fff;
            border-top: 1px solid #dee2e6;
            padding: 0.6rem 1rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }
        #bottom-bar .form-check-label {
            font-size: 0.875rem;
        }
        #bottom-bar .form-control {
            font-size: 0.875rem;
            padding: 0.3rem 0.6rem;
        }
        #bottom-bar label.small-label {
            font-size: 0.8rem;
            color: #6c757d;
            margin-bottom: 0.15rem;
        }
    </style>
</head>
<body>

    <!-- ══ TOP BAR ══ -->
    <div id="top-bar">
        <span class="fw-semibold me-2" style="font-size:1.1rem;">
            <span class="material-symbols-outlined">slideshow</span> Slideshow Editor
        </span>

        <button class="btn btn-primary">
            <span class="material-symbols-outlined">download</span> Download Slideshow
        </button>

        <div class="upload-group">
            <div class="drop-zone">
                <span class="material-symbols-outlined">upload</span> Upload Slideshow
                <small>(Drag &amp; Drop)</small>
            </div>
            <button class="btn btn-outline-primary btn-sm w-100">
                <span class="material-symbols-outlined">folder_open</span> Datei auswählen
            </button>
        </div>

        <div class="upload-group">
            <div class="drop-zone">
                <span class="material-symbols-outlined">image</span> Upload Images as Slides
                <small>(Drag &amp; Drop)</small>
            </div>
            <button class="btn btn-outline-primary btn-sm w-100">
                <span class="material-symbols-outlined">folder_open</span> Bilder auswählen
            </button>
        </div>
    </div>

    <!-- ══ EDITOR AREA ══ -->
    <div id="editor-area">

        <!-- Slide Carousel -->
        <div id="slide-carousel">
            <h6>Slides</h6>

            <div class="slide-thumb active">
                <div class="thumb-preview">
                    <div class="fake-line fake-title"></div>
                    <div class="fake-gap"></div>
                    <div class="fake-line fake-line-l"></div>
                    <div class="fake-line fake-line-m"></div>
                    <div class="fake-line fake-line-s"></div>
                </div>
                <div class="thumb-footer">
                    <span class="thumb-index">1</span>
                    <button class="btn btn-outline-danger btn-remove btn-sm"><span class="material-symbols-outlined">close</span></button>
                </div>
            </div>

            <div class="slide-thumb">
                <div class="thumb-preview">
                    <div class="fake-line fake-title"></div>
                    <div class="fake-gap"></div>
                    <div class="fake-img"></div>
                    <div class="fake-gap"></div>
                    <div class="fake-line fake-line-m"></div>
                </div>
                <div class="thumb-footer">
                    <span class="thumb-index">2</span>
                    <button class="btn btn-outline-danger btn-remove btn-sm"><span class="material-symbols-outlined">close</span></button>
                </div>
            </div>

            <div class="slide-thumb">
                <div class="thumb-preview">
                    <div class="fake-line fake-title" style="width:70%"></div>
                    <div class="fake-gap"></div>
                    <div class="fake-line fake-line-l"></div>
                    <div class="fake-line fake-line-l"></div>
                    <div class="fake-line fake-line-m"></div>
                    <div class="fake-line fake-line-s"></div>
                </div>
                <div class="thumb-footer">
                    <span class="thumb-index">3</span>
                    <button class="btn btn-outline-danger btn-remove btn-sm"><span class="material-symbols-outlined">close</span></button>
                </div>
            </div>

            <div class="slide-thumb">
                <div class="thumb-preview">
                    <div class="fake-line fake-title" style="width:40%"></div>
                    <div class="fake-gap"></div>
                    <div class="fake-img" style="width:70%;height:18px;"></div>
                </div>
                <div class="thumb-footer">
                    <span class="thumb-index">4</span>
                    <button class="btn btn-outline-danger btn-remove btn-sm"><span class="material-symbols-outlined">close</span></button>
                </div>
            </div>

            <div id="carousel-actions">
                <button class="btn btn-outline-success btn-add"><span class="material-symbols-outlined">add</span> Neue Slide</button>
            </div>
        </div>

        <!-- Slide Editor -->
        <div id="slide-editor">
            <label for="slide-content">Slide 1 – Inhalt</label>
            <div id="slide-16-9-wrap">
                <textarea id="slide-content" class="form-control" placeholder="Slide-Inhalt hier eingeben…&#10;&#10;Unterstützt Markdown, HTML oder Plain Text."></textarea>
            </div>
        </div>

    </div>

    <!-- ══ BOTTOM BAR ══ -->
    <div id="bottom-bar">

        <button class="btn btn-success">
            <span class="material-symbols-outlined">play_arrow</span> Slideshow starten
        </button>

        <div class="form-check mb-0">
            <input class="form-check-input" type="checkbox" id="withCountdown" checked>
            <label class="form-check-label" for="withCountdown">
                Mit Countdown
            </label>
        </div>

        <div class="d-flex flex-column">
            <label class="small-label" for="countdownEnd">Countdown Endzeitpunkt</label>
            <input
                class="form-control"
                type="datetime-local"
                id="countdownEnd"
                value="2026-05-05T18:00"
                style="width: 220px;"
            />
        </div>

    </div>

</body>
</html>
